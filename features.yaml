# Feature matrix for curl fixtures.
# Extracted from API reference docs. Each feature maps to one or more test cases in cases/.
# Status: "covered" = has a fixture, "todo" = needs one, "skip" = not relevant for lm15
#
# Last updated: 2026-04-13

openai:
  endpoint: "POST https://api.openai.com/v1/responses"
  doc: "api-references/openai/pages/responses--create.md"
  features:
    # --- Core ---
    basic_text:
      description: "Simple text prompt → text response"
      status: covered
    streaming:
      description: "stream: true"
      status: covered
    system_prompt:
      description: "instructions field (system prompt)"
      status: covered
    temperature:
      description: "temperature + max_output_tokens"
      status: covered
    tools:
      description: "Function calling with tools array"
      status: covered

    # --- Input types ---
    image_url:
      description: "Image input via URL (input_image with image_url)"
      status: covered
    image_file:
      description: "Image input via file_id"
      status: todo
    file_input:
      description: "File/PDF input via file object"
      status: todo
    multi_turn:
      description: "Multiple user/assistant messages"
      status: todo
    multi_turn_tool_result:
      description: "Conversation with tool call + tool result"
      status: todo

    # --- Tool configuration ---
    tool_choice_auto:
      description: "tool_choice: 'auto'"
      status: todo
    tool_choice_required:
      description: "tool_choice: 'required'"
      status: covered
    tool_choice_none:
      description: "tool_choice: 'none'"
      status: covered
    tool_choice_specific:
      description: "tool_choice: {type: 'function', name: 'fn'}"
      status: covered
    parallel_tool_calls:
      description: "parallel_tool_calls: true/false"
      status: todo
    max_tool_calls:
      description: "max_tool_calls limit"
      status: todo

    # --- Output configuration ---
    structured_output:
      description: "text.format with json_schema response format"
      status: covered
    structured_output_json_object:
      description: "text.format with json_object type"
      status: covered
    top_p:
      description: "top_p sampling parameter"
      status: covered
    top_logprobs:
      description: "top_logprobs for token probabilities"
      status: todo

    # --- Reasoning ---
    reasoning:
      description: "reasoning.effort parameter"
      status: todo
    reasoning_encrypted:
      description: "reasoning with encrypted_content include"
      status: todo

    # --- Built-in tools ---
    web_search:
      description: "Web search tool"
      status: todo
    file_search:
      description: "File search / retrieval tool"
      status: todo
    code_interpreter:
      description: "Code interpreter tool"
      status: todo
    computer_use:
      description: "Computer use tool"
      status: todo

    # --- Conversation / state ---
    previous_response_id:
      description: "Chain responses via previous_response_id"
      status: todo
    conversation:
      description: "Conversation object for multi-turn"
      status: todo
    store:
      description: "store: true/false for response storage"
      status: todo

    # --- Advanced ---
    background:
      description: "background: true for async processing"
      status: todo
    truncation:
      description: "truncation: 'auto' or 'disabled'"
      status: todo
    service_tier:
      description: "service_tier selection"
      status: todo
    metadata:
      description: "Request metadata"
      status: todo
    prompt:
      description: "Stored prompt reference"
      status: todo
    include:
      description: "include array for additional output data"
      status: todo
    context_management:
      description: "Context management / compaction configuration"
      status: todo
    prompt_cache_key:
      description: "prompt_cache_key for caching"
      status: todo
    prompt_cache_retention:
      description: "prompt_cache_retention duration"
      status: todo
    safety_identifier:
      description: "safety_identifier for content filtering"
      status: todo
    stream_options:
      description: "stream_options (include_obfuscation)"
      status: todo
    user:
      description: "user identifier for abuse tracking"
      status: todo

